<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" name="viewport" />
  <title>Stencil Component Starter</title>

  <script src="/build/seal-components.esm.js" type="module"></script>
  <script nomodule src="/build/seal-components.js"></script>
</head>
  <body>
    <my-component first="Stencil" last="JS" middle="'Don't call me a framework'"></my-component>

    <seal-roulette></seal-roulette>
  </body>

<script>
  const sealRoulette = document.querySelector('seal-roulette');

  sealRoulette.addEventListener('spinning', () => {
    console.log('Roulette started spinnng');
    sealRoulette.radius = Math.random() * 100 + 200;
  });

  sealRoulette.addEventListener('stopped', (event) => {
    console.log('Selected arc:', event.detail);
    sealRoulette.radius = Math.random() * 100 + 200;
  });
</script>
</html>
